name: CI

on:
  push:
    branches:
      - master
      - development
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Emacs ${{ matrix.emacs-version }}
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - emacs-version: "29.4"
            emacs-source-ref: ""
          - emacs-version: "30.2"
            emacs-source-ref: ""
          # Track the prerelease branch honestly as 31.x until GNU publishes
          # refs/tags/emacs-31.1, then switch this row to 31.1 and that tag.
          # A future emacs-32 lane needs only another source-backed matrix row.
          - emacs-version: "31.x"
            emacs-source-ref: refs/heads/emacs-31

    env:
      IMAGE_NAME: combobulate-test:${{ matrix.emacs-version }}
      ERT_REPORT: test-results/emacs-${{ matrix.emacs-version }}/ert

    steps:
      - name: Check out the repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          submodules: recursive
          persist-credentials: false

      - name: Resolve Emacs source revision
        id: emacs-source
        env:
          EMACS_SOURCE_REF: ${{ matrix.emacs-source-ref }}
          # Established read-only mirror of the canonical Savannah repository.
          EMACS_SOURCE_REPOSITORY: https://github.com/emacs-mirror/emacs.git
        run: |
          set -euo pipefail
          cache_key="emacs-${{ matrix.emacs-version }}"
          source_sha=""

          if [[ -n "$EMACS_SOURCE_REF" ]]; then
            case "$EMACS_SOURCE_REF" in
              refs/heads/*|refs/tags/*) ;;
              *) echo "Unsupported Emacs source ref: $EMACS_SOURCE_REF" >&2; exit 1 ;;
            esac

            resolution="$(git ls-remote --exit-code \
              "$EMACS_SOURCE_REPOSITORY" \
              "$EMACS_SOURCE_REF" "${EMACS_SOURCE_REF}^{}")"
            source_sha="$(awk -v ref="$EMACS_SOURCE_REF" '
              $2 == ref { direct = $1 }
              $2 == ref "^{}" { peeled = $1 }
              END { if (peeled) print peeled; else if (direct) print direct }
            ' <<< "$resolution")"

            if [[ ! "$source_sha" =~ ^[0-9a-f]{40}$ ]]; then
              echo "Could not resolve $EMACS_SOURCE_REF to a full commit SHA" >&2
              exit 1
            fi
            cache_key="${cache_key}-${source_sha}"
            echo "Resolved $EMACS_SOURCE_REF to $source_sha"
          fi

          printf 'sha=%s\n' "$source_sha" >> "$GITHUB_OUTPUT"
          printf 'cache-key=%s\n' "$cache_key" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Build the test image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          load: true
          tags: ${{ env.IMAGE_NAME }}
          build-args: |
            EMACS_VERSION=${{ matrix.emacs-version }}
            EMACS_SOURCE_REF=${{ matrix.emacs-source-ref }}
            EMACS_SOURCE_SHA=${{ steps.emacs-source.outputs.sha }}
          cache-from: type=gha,scope=${{ steps.emacs-source.outputs.cache-key }}-${{ github.base_ref || github.ref_name }}
          cache-to: ${{ github.event_name == 'push' && format('type=gha,mode=max,scope={0}-{1}', steps.emacs-source.outputs.cache-key, github.ref_name) || '' }}

      - name: Verify Emacs and tree-sitter grammars
        run: |
          docker run --rm \
            --network none \
            --cap-drop ALL \
            --security-opt no-new-privileges \
            --pids-limit 512 \
            --memory 2g \
            --cpus 2 \
            --user "$(id -u):$(id -g)" \
            --entrypoint emacs \
            "$IMAGE_NAME" \
            --batch --no-init-file \
            --eval '(progn
              (princ (format "Emacs %s; tree-sitter=%S\n"
                             emacs-version (treesit-available-p)))
              (unless (treesit-available-p)
                (error "Emacs was built without tree-sitter support"))
              (dolist (language (quote (css dockerfile go html javascript json
                                        python toml tsx typescript yaml)))
                (unless (treesit-language-available-p language)
                  (error "Missing %s grammar" language))))'

      - name: Run load-path smoke test
        run: |
          docker run --rm \
            --network none \
            --cap-drop ALL \
            --security-opt no-new-privileges \
            --pids-limit 512 \
            --memory 2g \
            --cpus 2 \
            --user "$(id -u):$(id -g)" \
            --entrypoint emacs \
            "$IMAGE_NAME" \
            --batch --no-init-file --directory /opt \
            --eval '(progn
              (require (quote combobulate))
              (unless (featurep (quote combobulate))
                (error "Combobulate did not load from /opt")))'

      - name: Run ERT suite
        run: |
          mkdir -p "$GITHUB_WORKSPACE/test-results"
          docker run --rm \
            --network none \
            --cap-drop ALL \
            --security-opt no-new-privileges \
            --pids-limit 512 \
            --memory 4g \
            --cpus 2 \
            --user "$(id -u):$(id -g)" \
            --env "ERT_JUNIT_FILE=/workspace/$ERT_REPORT" \
            --volume "$GITHUB_WORKSPACE:/workspace" \
            --workdir /workspace \
            "$IMAGE_NAME" run-tests-junit

      - name: Upload ERT results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ert-results-${{ matrix.emacs-version }}
          path: ${{ env.ERT_REPORT }}.xml
          if-no-files-found: error
          retention-days: 14

      - name: Run load-path installation smoke test
        run: |
          docker run --rm \
            --cap-drop ALL \
            --security-opt no-new-privileges \
            --pids-limit 512 \
            --memory 4g \
            --cpus 2 \
            --user "$(id -u):$(id -g)" \
            --volume "$GITHUB_WORKSPACE:/workspace" \
            --workdir /workspace \
            "$IMAGE_NAME" tests/.ts-loadpath.el

      # These installers deliberately clone the development branch, so only run
      # them when that remote branch contains the revision under test.
      - name: Run straight.el installation smoke test
        if: github.ref == 'refs/heads/development' && matrix.emacs-version == '29.4'
        run: |
          docker run --rm \
            --cap-drop ALL \
            --security-opt no-new-privileges \
            --pids-limit 512 \
            --memory 4g \
            --cpus 2 \
            --user "$(id -u):$(id -g)" \
            --volume "$GITHUB_WORKSPACE:/workspace" \
            --workdir /workspace \
            "$IMAGE_NAME" tests/.ts-straight.el

      - name: Run use-package :vc installation smoke test
        if: github.ref == 'refs/heads/development' && matrix.emacs-version == '30.2'
        run: |
          docker run --rm \
            --cap-drop ALL \
            --security-opt no-new-privileges \
            --pids-limit 512 \
            --memory 4g \
            --cpus 2 \
            --user "$(id -u):$(id -g)" \
            --volume "$GITHUB_WORKSPACE:/workspace" \
            --workdir /workspace \
            "$IMAGE_NAME" tests/.ts-use-package-vc.el

      - name: Regenerate test harnesses
        if: matrix.emacs-version == '29.4'
        run: |
          docker run --rm \
            --network none \
            --cap-drop ALL \
            --security-opt no-new-privileges \
            --pids-limit 512 \
            --memory 4g \
            --cpus 2 \
            --user "$(id -u):$(id -g)" \
            --volume "$GITHUB_WORKSPACE:/workspace" \
            --workdir /workspace \
            "$IMAGE_NAME" build-tests

      - name: Check generated test harnesses
        if: matrix.emacs-version == '29.4'
        run: git diff --exit-code -- tests

  # Never execute pull-request code in this job. It alone can create Checks and
  # consumes only the exact JUnit artifact emitted by the unprivileged test job.
  report:
    # GitHub evaluates this job's trust gate before expanding its matrix. Keep
    # the job name static so skipped fork-PR runs never expose a raw expression.
    name: Publish ERT checks
    needs: test
    if: ${{ always() && !cancelled() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read
      checks: write

    strategy:
      fail-fast: false
      matrix:
        emacs-version:
          - "29.4"
          - "30.2"
          - "31.x"

    steps:
      - name: Download ERT results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ert-results-${{ matrix.emacs-version }}
          path: test-results/emacs-${{ matrix.emacs-version }}

      - name: Publish ERT results
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        with:
          name: ERT / Emacs ${{ matrix.emacs-version }}
          path: test-results/emacs-${{ matrix.emacs-version }}/ert.xml
          reporter: java-junit
          use-actions-summary: false
          list-suites: all
          list-tests: failed
          # ERT does not include source paths, so annotations would require a
          # privileged checkout without improving the report.
          max-annotations: 0
          fail-on-empty: true
          fail-on-error: true
